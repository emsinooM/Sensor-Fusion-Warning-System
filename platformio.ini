; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = Sensor_Fusion\Core\Src
include_dir = Sensor_Fusion\Core\Inc


[env:genericSTM32F103C8]
platform = ststm32
board = genericSTM32F103C8
framework = stm32cube

; 1. Tối ưu hóa và Cảnh báo
build_type = debug
build_flags = 
    -Wall 
    --specs=nano.specs          
    -I include
    -I Drivers/CMSIS/Include
    -I Drivers/STM32F1xx_HAL_Driver/Inc
    -I Drivers/STM32F1xx_HAL_Driver/Inc/Legacy
    -I Drivers/CMSIS/Device/ST/STM32F1xx/Include
    ; --- ĐƯỜNG DẪN BỔ SUNG CHO FREERTOS ---
    -I Sensor_Fusion/Middlewares/Third_Party/FreeRTOS/Source/include
    -I Sensor_Fusion/Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS
    -I Sensor_Fusion/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM3

; 3. Chỉ định các file .c cần đem đi biên dịch
build_src_filter = 
    +<*> 
    +<../../Middlewares/Third_Party/FreeRTOS/Source/**/*.c>

upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200